- name: DeployHomebox
  hosts: docker
  vars_files:
    - secrets.yml
  tasks:
    - name: Ensure project directory is present
      ansible.builtin.file:
        path: ~/homebox
        state: directory
        mode: "0755"
    - name: Copy compose to Node
      ansible.builtin.copy:
        src: compose.yml
        dest: ~/homebox/docker-compose.yml
        mode: "0644"
    - name: Create and start docker compose services
      community.docker.docker_compose_v2:
        project_src: ./homebox
        state: present
