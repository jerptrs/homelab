version: '3.8'

services:
  vault:
    container_name: vault
    image: vault
    restart: unless-stopped
    ports:
      - 8200:8200
    cap_add: 
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=myroot
    networks:
      #- traefik
      - vault
    volumes:
      - vault:/vault/file
      - vault:/vault/config

networks:
  #traefik:
    #external: true
  vault:
    name: vault 

volumes:
  vault:
    name: vault