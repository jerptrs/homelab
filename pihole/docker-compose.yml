version: "3"

services:
  pihole:
    hostname: ${HOSTNAME}
    container_name: pihole
    image: pihole/pihole:latest
    env_file:
      - ./.env
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "80:80/tcp"
    volumes:
      - '/container/pihole/etc:/etc/pihole'
      - '/container/pihole/etc-dnsmasq.d:/etc/dnsmasq.d'      
    labels:
      - "traefik.http.routers.homeassistant.rule=Host(`${HOSTNAME}`)"
    restart: unless-stopped
    networks:
      - traefik

networks:
  traefik:
    name: traefik